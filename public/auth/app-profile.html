<!DOCTYPE html>
<!-- @dsCard group="Brand" name="GBICT Energy — App Create Profile" subtitle="iOS frame · profile setup · avatar, home, device chips" viewport="900x980" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GBICT Energy — App profile</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="logo-data.js"></script>
<style>
  :root{
    --bg:#F3EEE3; --card:#FFFFFF; --card-2:#FBF7EF;
    --ink:#211D16; --ink-2:#5C5648; --ink-3:#938C7C;
    --line:rgba(33,29,22,0.09); --line-2:rgba(33,29,22,0.06);
    --accent:#2F5D3A; --accent-deep:#24492D; --accent-soft:#5C8A5E; --accent-tint:#E7EEE0;
    --sun:#D9A441; --sun-tint:#F6ECD6;
    --shadow:0 1px 2px rgba(33,29,22,.04), 0 8px 24px rgba(33,29,22,.06);
    --shadow-lg:0 2px 6px rgba(33,29,22,.06), 0 24px 60px rgba(33,29,22,.14);
    --font:'Satoshi',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px;
    background:radial-gradient(120% 90% at 50% -10%, #FBF7EF 0%, #F0E9DC 46%, #E7DECD 100%)}
  button,input{font-family:inherit}

  .device{position:relative;width:390px;height:844px;flex:none;border-radius:54px;background:var(--bg);
    box-shadow:var(--shadow-lg),0 0 0 11px #0d0f0a,0 0 0 12.5px rgba(255,255,255,.06);overflow:hidden;isolation:isolate}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:34px;border-radius:20px;background:#000;z-index:80}
  .statusbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:70;display:flex;align-items:center;justify-content:space-between;padding:0 30px;pointer-events:none}
  .statusbar .t{font-size:15px;font-weight:650;color:var(--ink);padding-top:14px}
  .statusbar .r{display:flex;align-items:center;gap:7px;padding-top:14px;color:var(--ink)}
  .statusbar svg{width:17px;height:17px}
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:99px;z-index:75;background:rgba(33,29,22,.28)}

  .screen{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column}
  .scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:70px 24px 12px}
  .scroll::-webkit-scrollbar{display:none}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .back{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;color:var(--ink);cursor:pointer;flex:none}
  .back svg{width:18px;height:18px}
  .steps{display:flex;gap:6px;flex:1;align-items:center}
  .steps .s{height:5px;border-radius:99px;background:color-mix(in srgb,var(--ink) 12%,transparent);flex:1}
  .steps .s.done,.steps .s.now{background:var(--accent)}

  h1{font-size:25px;font-weight:700;letter-spacing:-.03em;margin:4px 0 4px}
  .sub{font-size:14px;color:var(--ink-2);margin:0 0 22px;line-height:1.45}

  .av-up{position:relative;width:92px;height:92px;margin:0 auto 24px}
  .av-up .circ{width:92px;height:92px;border-radius:50%;background:linear-gradient(150deg,var(--accent-soft),var(--accent-deep));display:grid;place-items:center;color:#fff;font-size:34px;font-weight:700}
  .av-up .cam{position:absolute;right:-2px;bottom:-2px;width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-2);box-shadow:var(--shadow);cursor:pointer}
  .av-up .cam svg{width:17px;height:17px}

  form{display:flex;flex-direction:column;gap:15px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .frow{display:grid;grid-template-columns:1fr 1.3fr;gap:10px}
  .input{position:relative}
  .input>svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--ink-3);pointer-events:none}
  .input input{width:100%;height:50px;border-radius:13px;border:1px solid var(--line);background:var(--card-2);
    padding:0 14px 0 42px;font-size:15px;color:var(--ink);outline:none;transition:border-color .16s,box-shadow .16s}
  .input input.plain{padding-left:14px}
  .input input::placeholder{color:var(--ink-3)}
  .input input:focus{border-color:var(--accent-soft);box-shadow:0 0 0 3px var(--accent-tint);background:var(--card)}
  .input .eye{left:auto;right:13px;cursor:pointer;pointer-events:auto}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{display:inline-flex;align-items:center;gap:7px;height:42px;padding:0 15px;border-radius:99px;border:1px solid var(--line);background:var(--card-2);
    font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.15s;user-select:none}
  .chip svg{width:16px;height:16px}
  .chip.on{background:var(--accent-tint);border-color:var(--accent-soft);color:var(--accent-deep)}

  .foot{flex:none;padding:14px 24px calc(22px);background:linear-gradient(to top, var(--bg) 70%, transparent);
    box-shadow:0 -1px 0 var(--line-2)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;height:54px;border-radius:15px;border:none;width:100%;
    font-size:15.5px;font-weight:650;letter-spacing:-.01em;cursor:pointer;transition:.16s;background:var(--accent);color:#fff;box-shadow:0 10px 22px -10px rgba(47,93,58,.6)}
  .btn:active{transform:scale(.98)}
  .btn svg{width:18px;height:18px;stroke-width:2.2}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#2F5D3A">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="22" fill="#2F5D3A"/>
  <circle cx="50" cy="40" r="13" fill="#fff"/>
  <path d="M30 74 C30 60 70 60 70 74 Z" fill="#fff"/>
</svg>
</template>

<div class="device">
  <div class="island"></div>
  <div class="statusbar">
    <div class="t">9:41</div>
    <div class="r"><i data-lucide="signal"></i><i data-lucide="wifi"></i><i data-lucide="battery-full"></i></div>
  </div>

  <div class="screen">
    <div class="scroll">
      <div class="top">
        <a class="back" href="app-login.html"><i data-lucide="chevron-left"></i></a>
        <div class="steps"><div class="s done"></div><div class="s now"></div><div class="s"></div></div>
      </div>

      <h1>Create your profile</h1>
      <p class="sub">A few details so we can tailor your savings.</p>

      <div class="av-up">
        <div class="circ" id="avinit">L</div>
        <button class="cam" type="button" title="Upload photo"><i data-lucide="camera"></i></button>
      </div>

      <form id="profileform" autocomplete="off">
        <div class="field">
          <label for="name">Full name</label>
          <div class="input"><i data-lucide="user"></i><input id="name" type="text" value="Lieke de Vries"></div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <div class="input"><i data-lucide="mail"></i><input id="email" type="email" placeholder="you@home.nl"></div>
        </div>
        <div class="field">
          <label for="phone">Phone number</label>
          <div class="input"><i data-lucide="phone"></i><input id="phone" type="tel" placeholder="+31 6 1234 5678"></div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input"><i data-lucide="lock"></i><input id="password" type="password" placeholder="••••••••"><i data-lucide="eye" class="eye" id="eye"></i></div>
        </div>
        <div class="field">
          <label for="home">Home name</label>
          <div class="input"><i data-lucide="house"></i><input id="home" type="text" placeholder="Lieke's home"></div>
        </div>
        <div class="frow">
          <div class="field"><label for="post">Postcode</label><div class="input"><input class="plain" id="post" type="text" placeholder="1011 AB"></div></div>
          <div class="field"><label for="city">City</label><div class="input"><input class="plain" id="city" type="text" placeholder="Amsterdam"></div></div>
        </div>
        <div class="field">
          <label>What's in your home?</label>
          <div class="chips" id="chips">
            <div class="chip on" data-k="battery"><i data-lucide="battery-charging"></i>Battery</div>
            <div class="chip on" data-k="solar"><i data-lucide="sun"></i>Solar</div>
            <div class="chip" data-k="ev"><i data-lucide="car"></i>EV</div>
            <div class="chip" data-k="heat"><i data-lucide="thermometer"></i>Heat pump</div>
            <div class="chip" data-k="meter"><i data-lucide="gauge"></i>Smart meter</div>
          </div>
        </div>
      </form>
    </div>

    <div class="foot">
      <button class="btn" id="finish"><i data-lucide="check"></i>Finish setup</button>
    </div>
  </div>

  <div class="home-ind"></div>
</div>

<script>
  if (window.LOGO_SRC) {} // logo not shown on this screen
  const nameEl = document.getElementById('name'), avEl = document.getElementById('avinit');
  function initials(v){ const p = v.trim().split(/\s+/); return ((p[0]||'')[0]||'L').toUpperCase() + ((p[1]||'')[0]||'').toUpperCase(); }
  nameEl.addEventListener('input', () => avEl.textContent = initials(nameEl.value) || 'L');
  document.querySelectorAll('#chips .chip').forEach(c => c.addEventListener('click', () => c.classList.toggle('on')));
  document.getElementById('eye').addEventListener('click', function(){
    const pw = document.getElementById('password'); const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    this.setAttribute('data-lucide', show ? 'eye-off' : 'eye'); window.lucide && window.lucide.createIcons();
  });
  document.getElementById('finish').addEventListener('click', () => { window.location.href = 'app-login.html'; });
  window.lucide && window.lucide.createIcons();
</script>
</body>
</html>
