name: Build & Submit iOS → App Store

on:
  push:
    branches: [main]
    # Only trigger when iOS-relevant files change
    paths:
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'public/**'
      - '.github/workflows/deploy-ios.yml'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      submit_to_store:
        description: 'Submit to App Store after build?'
        required: true
        default: 'true'
        type: boolean

jobs:
  build-ios:
    name: Build & Submit to App Store
    runs-on: macos-latest          # Must be macOS for Xcode

    # App Store Connect API key — used for cloud signing AND upload.
    # No exported .p12 distribution certificate is required: Xcode creates
    # and downloads the signing certificate + provisioning profile itself
    # via -allowProvisioningUpdates.
    env:
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node (for Capacitor sync) ──────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # ── 3. Sync Capacitor → iOS ──────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 4. Verify signing secrets are set ───────────────────
      - name: Verify App Store Connect secrets
        run: |
          missing=""
          [ -z "$ASC_KEY_ID" ]   && missing="$missing APP_STORE_CONNECT_API_KEY_ID"
          [ -z "$ASC_ISSUER_ID" ] && missing="$missing APP_STORE_CONNECT_ISSUER_ID"
          [ -z "$TEAM_ID" ]      && missing="$missing APPLE_TEAM_ID"
          [ -z "${{ secrets.APP_STORE_CONNECT_API_KEY }}" ] && missing="$missing APP_STORE_CONNECT_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      # ── 5. Write App Store Connect API key (.p8) to disk ─────
      # altool searches ~/.appstoreconnect/private_keys for AuthKey_<ID>.p8,
      # and xcodebuild reads it via -authenticationKeyPath. The secret must be
      # the raw .p8 contents (starts with -----BEGIN PRIVATE KEY-----).
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # ── 6. Build & Archive (automatic cloud signing) ────────
      - name: Build iOS Archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

      # ── 7. Export IPA (automatic signing) ────────────────────
      - name: Create ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      # ── 8. Upload to App Store Connect (TestFlight) ──────────
      - name: Upload to App Store Connect
        if: github.event.inputs.submit_to_store != 'false'
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      # ── 9. Save IPA as artifact ──────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GBICT-Energy-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/App.ipa
          retention-days: 30
